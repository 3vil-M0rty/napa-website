          <h1>NAPA Chapter One — Wine &amp; Cocktail Bar, Gueliz Marrakech</h1>
          <p>
            NAPA Chapter One is an intimate Art Deco wine and cocktail bar located in Gueliz, Marrakech, Morocco.
            Founded in 2026 by Aziz Nahas, Benjamin Pastor, and Simone Mérette — the team behind Farmers Marrakech —
            NAPA Chapter One offers a carefully curated selection of natural, organic, and biodynamic wines from producers
            around the world, alongside farm-to-bar cocktails crafted with Moroccan botanicals and ingredients
            sourced directly from Sanctuary Slimane, a permaculture farm on the outskirts of Marrakech.
          </p>
          <p>
            The bar features a restored Art Deco room with a curved counter, channel-tufted banquettes,
            vintage lighting, and hand-commissioned furniture. Small plates and sharing dishes are developed
            in collaboration with the kitchen at Farmers, the sister restaurant.
          </p>
          <p>
